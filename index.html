<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>3/3/3</title>
  <style>
    :root {
      --bg: #f3f0e8;
      --fg: #111;
      --muted: #5d5d5d;
      --line: #111;
      --accent: #d94f04;
      --panel: rgba(255, 255, 255, 0.35);
      --field: #fff;
      --button-fg: #fff;
      --toggle-bg: transparent;
      --toggle-fg: var(--fg);
      --toggle-active-bg: var(--fg);
      --toggle-active-fg: var(--bg);
      --toggle-border: var(--line);
      color-scheme: light;
    }

    :root[data-theme="dark"] {
      --bg: #111315;
      --fg: #f3f0e8;
      --muted: #b5aea1;
      --line: #f3f0e8;
      --accent: #ff6b2c;
      --panel: rgba(255, 255, 255, 0.06);
      --field: #1a1d20;
      --button-fg: #111315;
      --toggle-bg: transparent;
      --toggle-fg: var(--fg);
      --toggle-active-bg: var(--fg);
      --toggle-active-fg: #111315;
      --toggle-border: var(--line);
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: "Courier New", Courier, monospace;
    }

    body {
      padding: 20px;
    }

    .app {
      max-width: 980px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.5rem, 8vw, 5.5rem);
      line-height: 0.9;
      letter-spacing: -0.06em;
      text-transform: uppercase;
    }

    .note {
      margin: 10px 0 0;
      max-width: 34rem;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .note a {
      color: inherit;
      text-decoration-thickness: 2px;
      text-underline-offset: 0.15em;
    }

    .note a:hover,
    .note a:focus-visible {
      color: var(--accent);
      outline: none;
    }

    button {
      border: 3px solid var(--line);
      background: var(--accent);
      color: var(--button-fg);
      font: inherit;
      font-weight: 700;
      padding: 12px 16px;
      cursor: pointer;
      text-transform: uppercase;
    }

    button:hover,
    button:focus-visible {
      background: var(--fg);
      color: var(--bg);
      outline: none;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: flex-end;
    }

    .theme-toggle {
      display: inline-flex;
      border: 3px solid var(--toggle-border);
      background: var(--toggle-bg);
    }

    .theme-toggle button {
      border: 0;
      border-right: 3px solid var(--toggle-border);
      background: var(--toggle-bg);
      color: var(--toggle-fg);
      min-width: 56px;
      padding: 12px 14px;
    }

    .theme-toggle button:last-child {
      border-right: 0;
    }

    .theme-toggle button:hover,
    .theme-toggle button:focus-visible {
      background: var(--fg);
      color: var(--bg);
    }

    .theme-toggle button[aria-pressed="true"] {
      background: var(--toggle-active-bg);
      color: var(--toggle-active-fg);
    }

    .grid {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    }

    section {
      border: 3px solid var(--line);
      background: var(--panel);
      padding: 14px;
    }

    label {
      display: block;
      margin-bottom: 10px;
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    textarea {
      display: block;
      width: 100%;
      min-height: 280px;
      resize: vertical;
      padding: 14px;
      border: 3px solid var(--line);
      background: var(--field);
      color: inherit;
      font: inherit;
      line-height: 1.5;
    }

    textarea[name="main"] {
      min-height: 320px;
    }

    .task-stack {
      display: grid;
      gap: 12px;
    }

    .task-stack textarea {
      min-height: 88px;
    }

    .task-label {
      margin-bottom: 6px;
      font-size: 0.75rem;
      color: var(--muted);
    }

    textarea:focus-visible {
      outline: 0;
      border-color: var(--accent);
    }

    .status {
      margin-top: 14px;
      min-height: 1.2em;
      font-size: 0.85rem;
      color: var(--muted);
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="topbar">
      <div>
        <h1>3/3/3</h1>
        <p class="note">One main project. Three shorter tasks. Three maintenance tasks. Based on Oliver Burkeman's 3/3/3 idea from <a href="https://ckarchive.com/b/e5uph7hx43mn" target="_blank" rel="noopener noreferrer"><em>The Imperfectionist</em></a> and the post "3/3/3, a method for structuring the day."</p>
      </div>
      <div class="controls">
        <div class="theme-toggle" role="group" aria-label="Theme">
          <button type="button" data-theme-option="light" aria-pressed="false">Light</button>
          <button type="button" data-theme-option="dark" aria-pressed="false">Dark</button>
        </div>
        <button type="button" id="clear-all">Clear All</button>
      </div>
    </div>

    <div class="grid">
      <section>
        <label for="main">Main Project</label>
        <textarea
          id="main"
          name="main"
          placeholder="The one thing that matters today."
          spellcheck="false"
        ></textarea>
      </section>

      <section>
        <label for="short">Three Shorter Tasks</label>
        <div class="task-stack">
          <div>
            <div class="task-label">Task 1</div>
            <textarea
              id="short-1"
              name="short1"
              placeholder="Short task one."
              spellcheck="false"
            ></textarea>
          </div>
          <div>
            <div class="task-label">Task 2</div>
            <textarea
              id="short-2"
              name="short2"
              placeholder="Short task two."
              spellcheck="false"
            ></textarea>
          </div>
          <div>
            <div class="task-label">Task 3</div>
            <textarea
              id="short-3"
              name="short3"
              placeholder="Short task three."
              spellcheck="false"
            ></textarea>
          </div>
        </div>
      </section>

      <section>
        <label for="maintenance">Three Maintenance Tasks</label>
        <div class="task-stack">
          <div>
            <div class="task-label">Task 1</div>
            <textarea
              id="maintenance-1"
              name="maintenance1"
              placeholder="Maintenance task one."
              spellcheck="false"
            ></textarea>
          </div>
          <div>
            <div class="task-label">Task 2</div>
            <textarea
              id="maintenance-2"
              name="maintenance2"
              placeholder="Maintenance task two."
              spellcheck="false"
            ></textarea>
          </div>
          <div>
            <div class="task-label">Task 3</div>
            <textarea
              id="maintenance-3"
              name="maintenance3"
              placeholder="Maintenance task three."
              spellcheck="false"
            ></textarea>
          </div>
        </div>
      </section>
    </div>

    <p class="status" id="status" aria-live="polite"></p>
  </main>

  <script>
    const key = "brutalist-333";
    const themeKey = "brutalist-333-theme";
    const areas = Array.from(document.querySelectorAll("textarea"));
    const status = document.getElementById("status");
    const clearButton = document.getElementById("clear-all");
    const themeButtons = Array.from(document.querySelectorAll("[data-theme-option]"));

    const setTheme = (theme) => {
      document.documentElement.dataset.theme = theme;
      for (const button of themeButtons) {
        button.setAttribute("aria-pressed", String(button.dataset.themeOption === theme));
      }
    };

    const loadTheme = () => {
      const savedTheme = localStorage.getItem(themeKey);
      if (savedTheme === "dark" || savedTheme === "light") {
        setTheme(savedTheme);
        return;
      }

      const preferredDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
      setTheme(preferredDark ? "dark" : "light");
    };

    const save = () => {
      const data = {};
      for (const area of areas) data[area.name] = area.value;
      localStorage.setItem(key, JSON.stringify(data));
      status.textContent = "Saved";
    };

    const load = () => {
      try {
        const saved = JSON.parse(localStorage.getItem(key) || "{}");
        for (const area of areas) area.value = saved[area.name] || "";
      } catch {
        localStorage.removeItem(key);
      }
    };

    loadTheme();
    load();

    for (const button of themeButtons) {
      button.addEventListener("click", () => {
        const theme = button.dataset.themeOption;
        setTheme(theme);
        localStorage.setItem(themeKey, theme);
      });
    }

    for (const area of areas) {
      area.addEventListener("input", save, { passive: true });
    }

    clearButton.addEventListener("click", () => {
      for (const area of areas) area.value = "";
      localStorage.removeItem(key);
      status.textContent = "Cleared";
      areas[0].focus();
    });
  </script>
</body>
</html>
